<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary Meta ── -->
    <title>StreamTV — Tu contenido favorito en un solo lugar</title>
    <meta name="description" content="Disfruta de los mejores canales de TV en vivo y películas sin interrupciones. Todo en un solo lugar." />
    <meta name="theme-color" content="#0a0a0f" />

    <!-- ── Open Graph ── -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="StreamTV — Tu contenido favorito en un solo lugar" />
    <meta property="og:description" content="Disfruta de los mejores canales de TV en vivo y películas sin interrupciones." />
    <meta property="og:image" content="/og-image.png" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="StreamTV" />
    <meta name="twitter:description" content="Canales en vivo y películas en un solo lugar." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- ── Favicon: inline SVG ── -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23e50914'/%3E%3Crect x='6' y='10' width='14' height='10' rx='1.5' fill='none' stroke='%23fff' stroke-width='1.8'/%3E%3Cline x1='10' y1='20' x2='8' y2='24' stroke='%23fff' stroke-width='1.8' stroke-linecap='round'/%3E%3Cline x1='16' y1='20' x2='18' y2='24' stroke='%23fff' stroke-width='1.8' stroke-linecap='round'/%3E%3Cline x1='7' y1='24' x2='19' y2='24' stroke='%23fff' stroke-width='1.8' stroke-linecap='round'/%3E%3Ccircle cx='24' cy='12' r='4' fill='%23fff' opacity='0.15'/%3E%3Ccircle cx='24' cy='12' r='2' fill='%23fff'/%3E%3C/svg%3E" />

    <!-- ── Google Fonts preconnect ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- ── Font load: Bebas Neue + DM Sans ── -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&display=swap"
    />

    <!-- ── Base styles: dark background + prevent FOUC ── -->
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        background: #0a0a0f;
        color: #f0f0f0;
        min-height: 100%;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }

      /* Hide root until React hydrates — avoids white flash */
      #root { min-height: 100vh; }

      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #0a0a0f; }
      ::-webkit-scrollbar-thumb { background: #2a2a32; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #3a3a44; }

      /* Selection */
      ::selection { background: rgba(229, 9, 20, 0.35); color: #fff; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
